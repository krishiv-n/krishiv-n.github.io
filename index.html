  const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return "?";
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
}
function nameHue(name) {
  let h = 0; const s = String(name || "");
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) % 360;
  return h;
}
// A team's editable Predicted XI: seeded with its stars, padded to 11 slots.
function defaultLineup(team) {
  const stars = (TEAMS[team] && TEAMS[team].p) || [];
  const slots = [];
  for (let i = 0; i < 11; i++) slots.push(i < stars.length ? { n: stars[i], s: true } : { n: "", s: false });
  return slots;
}
function teamLineup(lineups, team) {
  const stored = lineups && lineups[team];
  if (Array.isArray(stored) && stored.length) {
    const out = stored.slice(0, 11).map((x) => ({ n: x.n || "", s: !!x.s }));
    while (out.length < 11) out.push({ n: "", s: false });
    return out;
  }
  return defaultLineup(team);
}

/* ============================ Scoring engine =============================== */
function scoreOne(pred, res, mult) {
  if (!pred || !res) return 0;
  const po = Math.sign(pred.h - pred.a);
  const ao = Math.sign(res.h - res.a);
  if (po !== ao) return 0; // wrong result
  let base;
  const exact = pred.h === res.h && pred.a === res.a;
  if (exact) base = 10;
  else if (ao === 0) base = 5; // correct draw, wrong scoreline
  else if (pred.h - pred.a === res.h - res.a) base = 7; // correct goal difference
  else if (pred.h === res.h || pred.a === res.a) base = 6; // one team's goals exact
  else base = 5; // correct result only
  return base * mult;
}
const MOTM_BASE = 5;
function motmBonus(pred, res, mult) {
  if (!pred || !res || !pred.motm || !res.motm) return 0;
  return pred.motm.trim().toLowerCase() === res.motm.trim().toLowerCase() ? MOTM_BASE * mult : 0;
}
function motmHit(pred, res) {
  return !!(pred && res && pred.motm && res.motm &&
    pred.motm.trim().toLowerCase() === res.motm.trim().toLowerCase());
}
function totalPts(pred, res, mult) {
  return scoreOne(pred, res, mult) + motmBonus(pred, res, mult);
}
// Fairness rule: a match only counts if BOTH players locked a prediction.
function bothIn(pk, pr) { return !!pk && !!pr; }
function tierLabel(pred, res) {
  if (!pred || !res) return null;
  const po = Math.sign(pred.h - pred.a);
  const ao = Math.sign(res.h - res.a);
  if (po !== ao) return { t: "Missed", cls: "miss" };
  const exact = pred.h === res.h && pred.a === res.a;
  if (exact) return { t: "Bullseye!", cls: "bull" };
  if (ao === 0) return { t: "Right result", cls: "ok" };
  if (pred.h - pred.a === res.h - res.a) return { t: "Goal diff", cls: "good" };
  if (pred.h === res.h || pred.a === res.a) return { t: "One spot-on", cls: "good" };
  return { t: "Right result", cls: "ok" };
}

/* ============================ Cloud sync (Firebase) ====================== */
// Reads FIREBASE_CONFIG + ROOM injected in the HTML <head>. If the config is
// still the placeholder, the app runs single-device using this browser's
// localStorage (no sync). Add your config to switch on live two-device sync.
const cloudOn = typeof FIREBASE_CONFIG !== "undefined" && !String(FIREBASE_CONFIG.apiKey || "").includes("PASTE");
let _db = null;
if (cloudOn) {
  try { firebase.initializeApp(FIREBASE_CONFIG); _db = firebase.database(); }
  catch (e) { console.warn("Firebase init failed:", e); }
}
const hasStore = cloudOn && !!_db;
const roomRef = (key) => _db.ref("rooms/" + ROOM + "/" + key);
function lget(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } }
function lset(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
async function sget(key) {
  if (hasStore) {
    try { const s = await roomRef(key).once("value"); return s.exists() ? s.val() : null; }
    catch (e) { console.warn(e); return lget(key); }
  }
  return lget(key);
}
async function sset(key, val) {
  lset(key, val);
  if (hasStore) { try { await roomRef(key).set(val); } catch (e) { console.warn(e); } }
}
async function meGet() { try { return localStorage.getItem("wc_me_v1"); } catch { return null; } }
async function meSet(v) { try { localStorage.setItem("wc_me_v1", v); } catch {} }
// realtime push: invoke cb whenever anything in the room changes
function subscribeRoom(cb) {
  if (!hasStore) return () => {};
  const ref = _db.ref("rooms/" + ROOM);
  const handler = ref.on("value", () => cb());
  return () => ref.off("value", handler);
}

                {result && counts && (
                  <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold tier-${myTier.cls}`}>+{myPts}</span>
                )}
              </div>
            )}
          </div>

          {!locked ? (
            <div className="mt-2 space-y-2.5">
              {/* step 1 · winner */}
              <div>
                <div className="text-[10px] text-slate-500 mb-1 font-semibold uppercase tracking-wide">1 · Who wins?</div>
                <div className="grid grid-cols-3 gap-1.5">
                  {[["home", home, flag(home)], ["draw", "Draw", "🤝"], ["away", away, flag(away)]].map(([k, lbl, ic]) => {
                    const w = (draft.h == null || draft.a == null) ? null : (draft.h > draft.a ? "home" : draft.h < draft.a ? "away" : "draw");
                    const on = w === k;
                    return (
                      <button key={k}
                        onClick={() => setDraft((d) => k === "home" ? { ...d, h: 1, a: 0 } : k === "away" ? { ...d, h: 0, a: 1 } : { ...d, h: 1, a: 1 })}
                        className={`px-1 py-1.5 rounded-lg text-[11px] font-bold border truncate transition active:scale-95 ${on ? "text-white" : "text-slate-300 border-slate-600 bg-slate-800/60"}`}
                        style={on ? { background: meColor, borderColor: meColor } : {}}>
                        <span className="mr-0.5">{ic}</span>{lbl}
                      </button>
                    );
                  })}
                </div>
              </div>
              {/* step 2 · score */}
              <div>
                <div className="text-[10px] text-slate-500 mb-1 font-semibold uppercase tracking-wide">2 · Exact score</div>
                <div className="flex items-center justify-center gap-2">
                  <span className="text-base">{flag(home)}</span>
                  <Stepper value={draft.h} color={meColor} onChange={(h) => setDraft((d) => ({ ...d, h, a: d.a == null ? 0 : d.a }))} />
                  <span className="text-slate-500 text-xs">–</span>
                  <Stepper value={draft.a} color={meColor} onChange={(a) => setDraft((d) => ({ ...d, a, h: d.h == null ? 0 : d.h }))} />
                  <span className="text-base">{flag(away)}</span>
                </div>
              </div>
              {/* step 3 · MOTM */}
              <div>
                <div className="text-[10px] text-slate-500 mb-1 font-semibold uppercase tracking-wide flex items-center gap-1">3 · <Star size={10} className="text-amber-300" /> Man of the Match</div>
                <button onClick={() => setOpenMotm((o) => !o)}
                  className="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg bg-slate-800/60 border border-slate-600 active:scale-[.99]">
                  {draft.motm ? <Avatar name={draft.motm} size={22} /> : <span className="w-[22px] h-[22px] rounded-full bg-slate-700 inline-flex items-center justify-center text-slate-400"><Star size={12} /></span>}
                  <span className="flex-1 text-left text-xs truncate" style={{ color: draft.motm ? "#e2e8f0" : "#64748b" }}>{draft.motm || "Pick a player (optional)"}</span>
                  {openMotm ? <ChevronDown size={14} className="text-slate-400" /> : <ChevronRight size={14} className="text-slate-400" />}
                </button>
                {openMotm && (
                  <div className="mt-1.5">
                    <MotmPicker value={draft.motm} onChange={(motm) => setDraft((d) => ({ ...d, motm }))} candidates={candidates} />
                  </div>
                )}
              </div>
              {/* lock */}
              <button
                disabled={!draftReady || !dirty}
                onClick={() => onSavePred(m.id, { h: draft.h, a: draft.a, motm: (draft.motm || "").trim() })}
                className="w-full py-2 rounded-lg text-sm font-bold disabled:opacity-30 active:scale-[.98] transition"
                style={{ background: dirty && draftReady ? meColor : "#334155", color: "#fff" }}>
                {myPred ? (dirty ? "Update prediction" : "Saved ✓") : "Lock in prediction"}
              </button>
            </div>
          ) : myPred && myPred.motm ? (
            <div className="flex items-center gap-1.5 mt-1 pl-3.5 text-[11px]">
              <span className="text-amber-300/70 flex items-center gap-0.5"><Star size={10} /> MOTM:</span>
              <Avatar name={myPred.motm} size={18} />
              <span style={{ color: meColor }} className="font-semibold truncate">{myPred.motm}</span>
              {result && result.motm && (myMotm
                ? <span className="text-emerald-400 font-bold whitespace-nowrap">✓ +{MOTM_BASE * mult}</span>
                : <span className="text-slate-600">✗</span>)}
            </div>
          ) : null}
        </div>

        {/* opponent pick */}
        <div className="mt-2 pt-2 border-t border-slate-800">
          <div className="flex items-center justify-between gap-2">
            <div className="flex items-center gap-1.5">
              <span className="w-2 h-2 rounded-full" style={{ background: oppColor }} />
              <span className="text-xs font-semibold" style={{ color: C[oppName].soft }}>{oppName}</span>
            </div>
            {!locked ? (
              <span className="text-[11px] text-slate-500 flex items-center gap-1"><Lock size={11} /> hidden until kickoff</span>
            ) : (
              <div className="flex items-center gap-2">
                <span className="text-lg font-bold tabular-nums" style={{ color: oppColor }}>
                  {oppPred ? `${oppPred.h}–${oppPred.a}` : "no pick"}
                </span>
                {result && counts && (
                  <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold tier-${oppTier.cls}`}>+{oppPts}</span>
                )}
              </div>
            )}
          </div>
          {locked && oppPred && oppPred.motm && (
            <div className="flex items-center gap-1.5 mt-1 pl-3.5 text-[11px]">
              <span className="text-amber-300/70 flex items-center gap-0.5"><Star size={10} /> MOTM:</span>
              <Avatar name={oppPred.motm} size={18} />
              <span style={{ color: oppColor }} className="font-semibold truncate">{oppPred.motm}</span>
              {result && result.motm && (oppMotm
                ? <span className="text-emerald-400 font-bold whitespace-nowrap">✓ +{MOTM_BASE * mult}</span>
                : <span className="text-slate-600">✗</span>)}
            </div>
          )}
        </div>

        {/* void notice */}
        {result && !counts && (
          <div className="mt-2.5 text-center text-[11px] text-amber-300 bg-amber-500/10 border border-amber-500/30 rounded-lg py-1.5 px-2">
            ⚠️ This match didn’t count — only one of you predicted it.
          </div>
        )}
      </div>

      {/* footer actions */}
      <div className="flex items-stretch border-t border-slate-700/50 text-[11px]">
        <button onClick={() => setOpenTeams((o) => !o)}
          className="flex-1 py-2 flex items-center justify-center gap-1 text-slate-300 hover:bg-slate-700/30">
          <Users size={12} /> Predicted XI {openTeams ? <ChevronDown size={12} /> : <ChevronRight size={12} />}
        </button>
        <button onClick={() => setOpenResult((o) => !o)}
          className="flex-1 py-2 flex items-center justify-center gap-1 text-slate-300 hover:bg-slate-700/30 border-l border-slate-700/50">
          <ListChecks size={12} /> {result ? "edit result" : "enter result"}
        </button>
      </div>

      {/* predicted XI panel (editable, synced) */}
      {openTeams && (
        <div className="px-3 py-3 bg-slate-900/40 border-t border-slate-700/40 grid grid-cols-1 sm:grid-cols-2 gap-4">
          {[home, away].map((tn) => {
            if (!TEAMS[tn]) return (
              <div key={tn} className="text-[11px] text-slate-600 italic">Team not decided yet.</div>
            );
            const xi = teamLineup(lineups, tn);
            const editing = editXI === tn;
            return (
              <div key={tn}>
                <div className="flex items-center justify-between mb-1.5">
                  <div className="font-semibold text-slate-200 text-xs flex items-center gap-1">{flag(tn)} {tn}</div>
                  <button onClick={() => setEditXI(editing ? null : tn)}
                    className="text-[10px] flex items-center gap-0.5 text-slate-400 hover:text-amber-300">
                    {editing ? <><Check size={11} /> done</> : <><Pencil size={10} /> edit</>}
                  </button>
                </div>
                <div className="space-y-1">
                  {xi.map((slot, idx) => (
                    <div key={idx} className="flex items-center gap-1.5">
                      <span className="w-4 text-[10px] text-slate-600 text-right tabular-nums">{idx + 1}</span>
                      {editing ? (
                        <>
                          <input value={slot.n}
                            onChange={(e) => {
                              const next = xi.map((s, j) => j === idx ? { ...s, n: e.target.value } : s);
                              onSaveLineup(tn, next);
                            }}
                            placeholder={`player ${idx + 1}`}
                            className="flex-1 min-w-0 bg-slate-900/70 border border-slate-600 rounded px-1.5 py-1 text-[11px] text-slate-100" />
                          <button onClick={() => { const next = xi.map((s, j) => j === idx ? { ...s, s: !s.s } : s); onSaveLineup(tn, next); }}
                            className={`text-[12px] px-1 ${slot.s ? "" : "opacity-25 grayscale"}`} title="mark standout">⭐</button>
                        </>
                      ) : (
                        slot.n ? (
                          <div className="flex items-center gap-1.5 min-w-0">
                            <Avatar name={slot.n} size={20} star={slot.s} />
                            <span className="text-[11px] text-slate-300 truncate">{slot.n}</span>
                          </div>
                        ) : (
                          <span className="text-[11px] text-slate-600 italic">empty — tap edit to add</span>
                        )
                      )}
                    </div>
                  ))}
                </div>
                {editing && (
                  <button onClick={() => onSaveLineup(tn, defaultLineup(tn))}
                    className="mt-1.5 text-[10px] text-slate-500 hover:text-slate-300">reset to stars</button>
                )}
              </div>
            );
          })}
          <p className="col-span-full text-[10px] text-slate-500">⭐ = standout. This is your editable predicted XI — update it anytime (e.g. after a team's latest match). Changes sync to both of you.</p>
        </div>
      )}

      {/* result entry panel */}
      {openResult && (
        <div className="px-3 py-2.5 bg-slate-900/50 border-t border-slate-700/40">
          <div className="flex items-center justify-center gap-3">
            <span className="text-xs text-slate-300">{flag(home)} {home}</span>
            <Stepper value={rDraft.h} color="#fff" onChange={(h) => setRDraft((d) => ({ ...d, h, a: d.a == null ? 0 : d.a }))} />
            <span className="text-slate-500">–</span>
            <Stepper value={rDraft.a} color="#fff" onChange={(a) => setRDraft((d) => ({ ...d, a, h: d.h == null ? 0 : d.h }))} />
            <span className="text-xs text-slate-300">{away} {flag(away)}</span>
          </div>
          <div className="mt-3">
            <div className="text-center text-[10px] text-amber-300/80 mb-1.5 flex items-center justify-center gap-1"><Star size={11} /> Actual Man of the Match (optional)</div>
            <div className="flex justify-center">
              <div className="w-full max-w-xs flex">
                <MotmPicker value={rDraft.motm} onChange={(motm) => setRDraft((d) => ({ ...d, motm }))} candidates={candidates} />
              </div>
            </div>
          </div>
          <div className="flex justify-center gap-2 mt-3">
            <button
              disabled={rDraft.h == null || rDraft.a == null}
              onClick={() => { onSaveResult(m.id, { h: rDraft.h, a: rDraft.a, motm: (rDraft.motm || "").trim() }); setOpenResult(false); }}
              className="px-3 py-1.5 rounded-lg text-xs font-bold bg-emerald-500 text-slate-900 disabled:opacity-30"
            >Save final score</button>
            {result && (
              <button onClick={() => { onSaveResult(m.id, null); setOpenResult(false); }}
                className="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-700 text-slate-200">Clear</button>
            )}
          </div>
          <p className="text-center text-[10px] text-slate-500 mt-2">Either of you can enter the final score &amp; MOTM — it scores both picks automatically.</p>
        </div>
      )}
    </div>
  );
}

/* ============================ Main App ==================================== */
function App() {
  const [me, setMe] = useState(null);
  const [data, setData] = useState({
    predKhushi: {}, predKrishiv: {}, results: {},
    tournKhushi: {}, tournKrishiv: {}, tournActual: {}, ko: {}, lineups: {},
  });
  const [tab, setTab] = useState("matches");
  const [filter, setFilter] = useState("upcoming");
  const [groupFilter, setGroupFilter] = useState("all");
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const [toast, setToast] = useState(null);
  const [confetti, setConfetti] = useState([]);
  const bootRef = useRef(false);

  const loadAll = useCallback(async () => {
    setSyncing(true);
    const seeded = await sget("wc_seeded_v1");
    if (!seeded) { await sset("wc_results", PREFILL_RESULTS); await sset("wc_seeded_v1", true); }
    const [pk, pr, res, tk, tr, ta, ko, lu] = await Promise.all([
      sget("wc_pred_Khushi"), sget("wc_pred_Krishiv"), sget("wc_results"),
      sget("wc_tourn_Khushi"), sget("wc_tourn_Krishiv"), sget("wc_tourn_actual"), sget("wc_ko"), sget("wc_lineups"),
    ]);
    setData({
      predKhushi: pk || {}, predKrishiv: pr || {}, results: res || {},
      tournKhushi: tk || {}, tournKrishiv: tr || {}, tournActual: ta || {}, ko: ko || {}, lineups: lu || {},
    });
    setLastSync(new Date());
    setSyncing(false);
  }, []);

  useEffect(() => {
    (async () => {
      const m = await meGet();
      if (m) setMe(m);
      await loadAll();
      bootRef.current = true;
    })();
  }, [loadAll]);

  // periodic + on-focus refresh so partners see each other's updates
  useEffect(() => {
    const iv = setInterval(() => { if (bootRef.current) loadAll(); }, 25000);
    const onFocus = () => { if (bootRef.current) loadAll(); };
    window.addEventListener("focus", onFocus);
    return () => { clearInterval(iv); window.removeEventListener("focus", onFocus); };
  }, [loadAll]);

  // live push updates from the shared room
  useEffect(() => {
    const unsub = subscribeRoom(() => { if (bootRef.current) loadAll(); });
    return unsub;
  }, [loadAll]);

  const showToast = (t) => { setToast(t); setTimeout(() => setToast(null), 2200); };

  const burst = () => {
    const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if (reduce) return;
    const pieces = Array.from({ length: 22 }, (_, i) => ({
      id: Date.now() + i, left: Math.random() * 100, delay: Math.random() * 0.2,
      emoji: ["🎉", "⚽", "🏆", "✨", "🥳"][i % 5], dur: 1.6 + Math.random() * 0.8,
    }));
    setConfetti(pieces);
    setTimeout(() => setConfetti([]), 2600);
  };

  // ---- mutations ----
  const savePred = async (id, val) => {
    const key = me === "Khushi" ? "predKhushi" : "predKrishiv";
    const next = { ...data[key], [id]: val };
    setData((d) => ({ ...d, [key]: next }));
    await sset(me === "Khushi" ? "wc_pred_Khushi" : "wc_pred_Krishiv", next);
    showToast("Prediction locked in");
  };
  const saveResult = async (id, val) => {
    const next = { ...data.results };
    if (val == null) delete next[id]; else next[id] = val;
    setData((d) => ({ ...d, results: next }));
    await sset("wc_results", next);
    if (val) {
      const m = MATCH_BY_ID[id]; const mult = STAGE[m.stage].mult;
      const k = scoreOne(data.predKhushi[id], val, mult);
      const r = scoreOne(data.predKrishiv[id], val, mult);
      if (k >= 10 * mult || r >= 10 * mult) burst();
      showToast("Result saved · points updated");
    } else showToast("Result cleared");
  };
  const saveKO = async (id, home, away) => {
    const next = { ...data.ko, [id]: { home, away } };
    setData((d) => ({ ...d, ko: next }));
    await sset("wc_ko", next);
  };
  const saveLineup = async (team, slots) => {
    const next = { ...data.lineups, [team]: slots };
    setData((d) => ({ ...d, lineups: next }));
    await sset("wc_lineups", next);
  };
  const saveTourn = async (key, val) => {
    const dkey = me === "Khushi" ? "tournKhushi" : "tournKrishiv";
    const next = { ...data[dkey], [key]: val };
    setData((d) => ({ ...d, [dkey]: next }));
    await sset(me === "Khushi" ? "wc_tourn_Khushi" : "wc_tourn_Krishiv", next);
  };
  const saveTournActual = async (key, val) => {
    const next = { ...data.tournActual, [key]: val };
    setData((d) => ({ ...d, tournActual: next }));
    await sset("wc_tourn_actual", next);
  };
  const chooseMe = async (name) => { setMe(name); await meSet(name); };
  const resetAll = async () => {
    for (const k of ["wc_pred_Khushi","wc_pred_Krishiv","wc_results","wc_tourn_Khushi","wc_tourn_Krishiv","wc_tourn_actual","wc_ko","wc_lineups"]) {
      await sset(k, k === "wc_results" ? {} : {});
    }
    await sset("wc_seeded_v1", true);
    await loadAll();
    showToast("Everything reset");
  };

  // ---- derived scores ----
  const totals = useMemo(() => {
    const t = { Khushi: 0, Krishiv: 0, exactK: 0, exactR: 0, resK: 0, resR: 0, motmK: 0, motmR: 0, voids: 0, byStage: {} };
    for (const m of ALL_MATCHES) {
      const res = data.results[m.id]; if (!res) continue;
      const pk = data.predKhushi[m.id], pr = data.predKrishiv[m.id];
      if (!pk || !pr) { if (pk || pr) t.voids++; continue; } // fairness rule: both must predict
      const mult = STAGE[m.stage].mult;
      const slk = scoreOne(pk, res, mult), slr = scoreOne(pr, res, mult);
      const sk = slk + motmBonus(pk, res, mult), sr = slr + motmBonus(pr, res, mult);
      t.Khushi += sk; t.Krishiv += sr;
      if (pk.h === res.h && pk.a === res.a) t.exactK++;
      if (pr.h === res.h && pr.a === res.a) t.exactR++;
      if (slk > 0) t.resK++; if (slr > 0) t.resR++;
      if (motmHit(pk, res)) t.motmK++; if (motmHit(pr, res)) t.motmR++;
      const st = STAGE[m.stage].label;
      t.byStage[st] = t.byStage[st] || { Khushi: 0, Krishiv: 0 };
      t.byStage[st].Khushi += sk; t.byStage[st].Krishiv += sr;
    }
    // tournament bonuses
    for (const b of TOURNAMENT_BETS) {
      const act = data.tournActual[b.key];
      if (!act) continue;
      if (data.tournKhushi[b.key] && data.tournKhushi[b.key] === act) t.Khushi += b.pts;
      if (data.tournKrishiv[b.key] && data.tournKrishiv[b.key] === act) t.Krishiv += b.pts;
    }
    return t;
  }, [data]);

  const leader = totals.Khushi === totals.Krishiv ? null : (totals.Khushi > totals.Krishiv ? "Khushi" : "Krishiv");

  // ---- match filtering ----
  const visibleMatches = useMemo(() => {
    const now = Date.now();
    const list = ALL_MATCHES.filter((m) => {
      if (groupFilter !== "all" && m.stage === "group" && m.grp !== groupFilter) return false;
      if (groupFilter !== "all" && m.stage !== "group" && groupFilter !== "KO") return false;
      const started = now >= Date.parse(m.dt);
      const done = !!data.results[m.id];
      if (filter === "upcoming") return !started && !done;
      if (filter === "done") return done;
      if (filter === "live") return started && !done;
      return true;
    });
    const asc = (a, b) => Date.parse(a.dt) - Date.parse(b.dt);
    list.sort(filter === "done" ? (a, b) => asc(b, a) : asc); // soonest first; finished = most recent first
    return list;
  }, [filter, groupFilter, data.results]);

  /* -------- identity gate -------- */
  if (!me) {
    return (
      <div className="min-h-screen w-full flex items-center justify-center p-6" style={bg}>
        <StyleTag />
        <div className="max-w-sm w-full text-center">
          <div className="text-5xl mb-3">🏆</div>
          <h1 className="text-2xl font-extrabold text-white tracking-tight">Khushi <span style={{ color: gold }}>🆚</span> Krishiv</h1>
          <p className="text-sm text-amber-300 font-semibold mb-1">World Cup 2026 · Prediction Duel</p>
          <p className="text-slate-400 text-sm mb-6">Pick who you are on this device. Your picks stay secret from the other until each match kicks off.</p>
          <div className="grid grid-cols-2 gap-3">
            {PLAYERS.map((p) => (
              <button key={p} onClick={() => chooseMe(p)}
                className="py-5 rounded-2xl font-bold text-white text-lg active:scale-95 transition border border-slate-600"
                style={{ background: `linear-gradient(160deg, ${C[p].solid}, ${C[p].soft})` }}>
                {p}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  const opp = me === "Khushi" ? "Krishiv" : "Khushi";

  return (
    <div className="min-h-screen w-full text-slate-100" style={bg}>
      <StyleTag />

      {/* confetti */}
      {confetti.length > 0 && (
        <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden">
          {confetti.map((c) => (
            <span key={c.id} className="confetti-pc" style={{ left: c.left + "%", animationDelay: c.delay + "s", animationDuration: c.dur + "s" }}>{c.emoji}</span>
          ))}
        </div>
      )}

      {/* toast */}
      {toast && (
        <div className="fixed top-3 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full bg-slate-900/95 border border-slate-600 text-sm font-semibold shadow-xl">
          {toast}
        </div>
      )}

      {/* ---- Scoreboard header (the signature) ---- */}
      <header className="sticky top-0 z-30 border-b border-slate-700/60" style={{ background: "linear-gradient(180deg,#0b1220ee,#0b1220cc)", backdropFilter: "blur(10px)" }}>
        <div className="max-w-2xl mx-auto px-3 pt-2.5 pb-2">
          <div className="flex items-center justify-between">
            <div className="flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-widest text-amber-300">
              <Trophy size={13} /> World Cup 2026
            </div>
            <div className="flex items-center gap-2">
              <button onClick={loadAll} className="flex items-center gap-1 text-[11px] text-slate-300 hover:text-white">
                <RefreshCw size={12} className={syncing ? "spin" : ""} /> {syncing ? "syncing" : "sync"}
              </button>
              <button onClick={() => setTab("settings")} className="text-slate-400 hover:text-white"><Settings size={15} /></button>
            </div>
          </div>

          {/* the duel scoreboard */}
          <div className="mt-1.5 grid grid-cols-[1fr_auto_1fr] items-center gap-2">
            {PLAYERS.map((p, idx) => {
              const isLeader = leader === p;
              const score = totals[p];
              return (
                <React.Fragment key={p}>
                  {idx === 1 && <div className="text-center text-slate-500 font-black text-sm">vs</div>}
                  <div className={`text-center ${idx === 1 ? "order-3" : ""}`}>
                    <div className="flex items-center justify-center gap-1">
                      {isLeader && <Crown size={14} style={{ color: gold }} className="crown" />}
                      <span className="font-extrabold tracking-tight" style={{ color: C[p].soft }}>{p}</span>
                      {p === me && <span className="text-[9px] px-1 rounded bg-slate-700 text-slate-300">you</span>}
                    </div>
                    <div className="text-4xl font-black tabular-nums leading-none mt-0.5" style={{ color: isLeader ? gold : "#e2e8f0" }}>{score}</div>
                  </div>
                </React.Fragment>
              );
            })}
          </div>
          <div className="text-center text-[10px] text-slate-500 mt-1">
            {leader ? `${leader} leads by ${Math.abs(totals.Khushi - totals.Krishiv)}` : "all square — it's a tie"}
          </div>
        </div>

        {/* tabs */}
        <div className="max-w-2xl mx-auto px-2 flex gap-1 overflow-x-auto no-scrollbar">
          {[
            ["matches", "Matches", Target],
            ["leaderboard", "Standings", Trophy],
            ["tournament", "Bonus bets", Award],
            ["scoring", "Scoring", Flame],
            ["settings", "Setup", Settings],
          ].map(([id, lbl, Icon]) => (
            <button key={id} onClick={() => setTab(id)}
              className={`px-3 py-2 text-xs font-bold whitespace-nowrap border-b-2 transition flex items-center gap-1 ${tab === id ? "border-amber-400 text-amber-300" : "border-transparent text-slate-400 hover:text-slate-200"}`}>
              <Icon size={13} /> {lbl}
            </button>
          ))}
        </div>
      </header>

      <main className="max-w-2xl mx-auto px-3 py-4 pb-24">
        {/* ================= MATCHES ================= */}
        {tab === "matches" && (
          <>
            <div className="flex gap-1.5 mb-2 overflow-x-auto no-scrollbar">
              {[["upcoming", "Upcoming"], ["live", "Locked"], ["done", "Finished"], ["all", "All"]].map(([id, lbl]) => (
                <button key={id} onClick={() => setFilter(id)}
                  className={`px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap ${filter === id ? "bg-amber-400 text-slate-900" : "bg-slate-800 text-slate-300"}`}>{lbl}</button>
              ))}
            </div>
            <div className="flex gap-1.5 mb-3 overflow-x-auto no-scrollbar">
              {["all", "A", "B", "C", "D", "E", "F", "G", "H", "I", "J", "K", "L", "KO"].map((g) => (
                <button key={g} onClick={() => setGroupFilter(g)}
                  className={`px-2.5 py-1 rounded-md text-[11px] font-semibold whitespace-nowrap ${groupFilter === g ? "bg-slate-200 text-slate-900" : "bg-slate-800/70 text-slate-400"}`}>
                  {g === "all" ? "All" : g === "KO" ? "Knockouts" : `Grp ${g}`}</button>
              ))}
            </div>

            {visibleMatches.length === 0 ? (
              <div className="text-center py-16 text-slate-500">
                <div className="text-3xl mb-2">🗓️</div>
                <p className="text-sm">No matches here. Try “All” or another filter.</p>
              </div>
            ) : (
              <div className="space-y-3">
                {visibleMatches.map((m) => (
                  <MatchCard
                    key={m.id} m={m} me={me} oppName={opp}
                    myPred={(me === "Khushi" ? data.predKhushi : data.predKrishiv)[m.id]}
                    oppPred={(opp === "Khushi" ? data.predKhushi : data.predKrishiv)[m.id]}
                    result={data.results[m.id]}
                    koLabel={data.ko[m.id]}
                    lineups={data.lineups}
                    onSavePred={savePred} onSaveResult={saveResult} onSaveKO={saveKO} onSaveLineup={saveLineup}
                  />
                ))}
              </div>
            )}
          </>
        )}

        {/* ================= LEADERBOARD ================= */}
        {tab === "leaderboard" && (
          <div className="space-y-4">
            <div className="grid grid-cols-2 gap-3">
              {PLAYERS.map((p) => (
                <div key={p} className="rounded-2xl p-4 border border-slate-700/60 bg-slate-800/40 text-center">
                  <div className="flex items-center justify-center gap-1 mb-1">
                    {leader === p && <Crown size={15} style={{ color: gold }} />}
                    <span className="font-bold" style={{ color: C[p].soft }}>{p}</span>
                  </div>
                  <div className="text-5xl font-black tabular-nums" style={{ color: leader === p ? gold : "#e2e8f0" }}>{totals[p]}</div>
                  <div className="text-[11px] text-slate-400 mt-2 space-y-0.5">
                    <div>🎯 {p === "Khushi" ? totals.exactK : totals.exactR} exact scores</div>
                    <div>✅ {p === "Khushi" ? totals.resK : totals.resR} correct results</div>
                    <div>⭐ {p === "Khushi" ? totals.motmK : totals.motmR} MOTM hits</div>
                  </div>
                </div>
              ))}
            </div>

            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="text-sm font-bold text-slate-200 mb-2 flex items-center gap-1.5"><ListChecks size={14} /> Points by stage</h3>
              {Object.keys(totals.byStage).length === 0 ? (
                <p className="text-xs text-slate-500">No finished matches scored yet.</p>
              ) : (
                <div className="space-y-2">
                  {Object.entries(totals.byStage).map(([st, v]) => {
                    const max = Math.max(v.Khushi, v.Krishiv, 1);
                    return (
                      <div key={st}>
                        <div className="flex justify-between text-[11px] text-slate-400 mb-0.5"><span>{st}</span><span>{v.Khushi} – {v.Krishiv}</span></div>
                        <div className="flex gap-1 h-2">
                          <div className="rounded-l-full" style={{ width: `${(v.Khushi / max) * 50}%`, background: C.Khushi.solid }} />
                          <div className="rounded-r-full ml-auto" style={{ width: `${(v.Krishiv / max) * 50}%`, background: C.Krishiv.solid }} />
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* head-to-head finished matches */}
            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="text-sm font-bold text-slate-200 mb-2 flex items-center gap-1.5"><Target size={14} /> Match-by-match</h3>
              {ALL_MATCHES.filter((m) => data.results[m.id]).length === 0 ? (
                <p className="text-xs text-slate-500">Once results are in, the per-match breakdown shows here.</p>
              ) : (
                <div className="space-y-1.5">
                  {ALL_MATCHES.filter((m) => data.results[m.id]).map((m) => {
                    const res = data.results[m.id]; const mult = STAGE[m.stage].mult;
                    const pk = data.predKhushi[m.id], pr = data.predKrishiv[m.id];
                    const counts = !!pk && !!pr;
                    const sk = counts ? totalPts(pk, res, mult) : 0;
                    const sr = counts ? totalPts(pr, res, mult) : 0;
                    const hm = data.ko[m.id] ? data.ko[m.id].home : m.home;
                    const aw = data.ko[m.id] ? data.ko[m.id].away : m.away;
                    return (
                      <div key={m.id} className="flex items-center gap-2 text-xs py-1 border-b border-slate-700/40 last:border-0">
                        <span className="w-8 text-right font-bold tabular-nums" style={{ color: counts && sk >= sr && sk > 0 ? C.Khushi.soft : "#64748b" }}>{counts ? sk : "–"}</span>
                        <div className="flex-1 text-center text-slate-300 truncate">
                          {flag(hm)} {hm} <span className="text-white font-bold">{res.h}–{res.a}</span> {aw} {flag(aw)}
                          {!counts && <span className="ml-1 text-[9px] text-amber-400/80">void</span>}
                        </div>
                        <span className="w-8 text-left font-bold tabular-nums" style={{ color: counts && sr >= sk && sr > 0 ? C.Krishiv.soft : "#64748b" }}>{counts ? sr : "–"}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ================= TOURNAMENT BETS ================= */}
        {tab === "tournament" && (
          <div className="space-y-4">
            <p className="text-sm text-slate-400">Big side-bets for the whole tournament. Lock these in early — they're only revealed to each other when you mark the real outcome.</p>
            {TOURNAMENT_BETS.map((b) => {
              const myV = (me === "Khushi" ? data.tournKhushi : data.tournKrishiv)[b.key] || "";
              const actual = data.tournActual[b.key] || "";
              const isPicker = b.key !== "topScorer";
              return (
                <div key={b.key} className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
                  <div className="flex items-center justify-between mb-2">
                    <h3 className="font-bold text-slate-100">{b.label}</h3>
                    <span className="text-xs font-bold px-2 py-0.5 rounded-full" style={{ background: "rgba(251,191,36,.16)", color: gold }}>+{b.pts} pts</span>
                  </div>
                  <label className="text-[11px] text-slate-400">Your pick</label>
                  {isPicker ? (
                    <select value={myV} onChange={(e) => saveTourn(b.key, e.target.value)}
                      className="w-full mt-1 bg-slate-900/70 border border-slate-600 rounded-lg px-2 py-2 text-sm text-slate-100">
                      <option value="">— choose a team —</option>
                      {Object.keys(TEAMS).map((t) => <option key={t} value={t}>{TEAMS[t].f} {t}</option>)}
                    </select>
                  ) : (
                    <input value={myV} onChange={(e) => saveTourn(b.key, e.target.value)} placeholder="player name"
                      className="w-full mt-1 bg-slate-900/70 border border-slate-600 rounded-lg px-2 py-2 text-sm text-slate-100" />
                  )}
                  {actual && (
                    <div className="mt-2 text-[11px] text-slate-400">
                      Actual: <span className="text-slate-100 font-semibold">{actual}</span>
                      {myV && (myV === actual ? <span className="text-emerald-400 font-bold"> · you nailed it +{b.pts}</span> : <span className="text-slate-500"> · missed</span>)}
                    </div>
                  )}
                  <details className="mt-2">
                    <summary className="text-[10px] text-slate-500 cursor-pointer">set the real outcome</summary>
                    {isPicker ? (
                      <select value={actual} onChange={(e) => saveTournActual(b.key, e.target.value)}
                        className="w-full mt-1 bg-slate-900/70 border border-slate-600 rounded-lg px-2 py-1.5 text-xs text-slate-100">
                        <option value="">— not decided —</option>
                        {Object.keys(TEAMS).map((t) => <option key={t} value={t}>{TEAMS[t].f} {t}</option>)}
                      </select>
                    ) : (
                      <input value={actual} onChange={(e) => saveTournActual(b.key, e.target.value)} placeholder="actual top scorer"
                        className="w-full mt-1 bg-slate-900/70 border border-slate-600 rounded-lg px-2 py-1.5 text-xs text-slate-100" />
                    )}
                  </details>
                </div>
              );
            })}
          </div>
        )}

        {/* ================= SCORING ================= */}
        {tab === "scoring" && (
          <div className="space-y-4">
            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-3 flex items-center gap-1.5"><Flame size={15} className="text-amber-400" /> How points work</h3>
              <p className="text-sm text-slate-400 mb-3">Predict the exact scoreline of every match, plus the Man of the Match. You earn more the closer you are — and the winner/draw call is baked in.</p>
              <div className="space-y-2">
                {[
                  ["🎯", "Exact scoreline", "Both numbers spot on (e.g. you said 2–1, it ends 2–1)", 10, "bull"],
                  ["📐", "Right result + goal difference", "Right winner and right margin (you said 2–1, it ends 3–2)", 7, "good"],
                  ["🎼", "Right result + one team exact", "Right winner and one team's goals exact", 6, "good"],
                  ["✅", "Right result only", "Right winner or draw, wrong score", 5, "ok"],
                  ["❌", "Wrong result", "Wrong winner / missed the draw", 0, "miss"],
                ].map(([emo, t, d, pts, cls]) => (
                  <div key={t} className="flex items-center gap-3 p-2.5 rounded-xl bg-slate-900/40">
                    <span className="text-xl">{emo}</span>
                    <div className="flex-1">
                      <div className="text-sm font-semibold text-slate-100">{t}</div>
                      <div className="text-[11px] text-slate-400">{d}</div>
                    </div>
                    <span className={`text-lg font-black tabular-nums tier-${cls} px-2 rounded-lg`}>{pts}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-2">Rounds multiply the stakes</h3>
              <p className="text-[11px] text-slate-400 mb-3">Base points above are multiplied by the round. A perfect Final scoreline is worth <span style={{ color: gold }} className="font-bold">60</span>.</p>
              <div className="grid grid-cols-2 gap-2 text-xs">
                {Object.values(STAGE).map((s) => (
                  <div key={s.label} className="flex justify-between px-3 py-1.5 rounded-lg bg-slate-900/40">
                    <span className="text-slate-300">{s.label}</span>
                    <span className="font-bold" style={{ color: gold }}>×{s.mult}</span>
                  </div>
                ))}
              </div>
            </div>
            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-2 flex items-center gap-1.5"><Star size={15} className="text-amber-400" /> Man of the Match</h3>
              <p className="text-[11px] text-slate-400 mb-2">On top of the scoreline, each of you picks the Man of the Match. Whoever enters the final score also sets the real MOTM. Nail it and you bank a bonus — and it multiplies by the round too.</p>
              <div className="grid grid-cols-2 gap-2 text-xs">
                <div className="flex justify-between px-3 py-1.5 rounded-lg bg-slate-900/40"><span className="text-slate-300">Group MOTM</span><span className="font-bold" style={{ color: gold }}>+5</span></div>
                <div className="flex justify-between px-3 py-1.5 rounded-lg bg-slate-900/40"><span className="text-slate-300">Final MOTM</span><span className="font-bold" style={{ color: gold }}>+30</span></div>
              </div>
            </div>
            <div className="rounded-2xl border border-amber-500/30 bg-amber-500/5 p-4">
              <h3 className="font-bold text-amber-200 mb-2 flex items-center gap-1.5"><Lock size={15} /> Fair-play rule</h3>
              <p className="text-[12px] text-slate-300">A match only counts if <span className="font-semibold text-white">both of you</span> locked a prediction before kickoff. If one of you forgets, that match is <span className="text-amber-300 font-semibold">void</span> — zero points for either side, so nobody wins on a walkover. Don't snooze on your picks!</p>
            </div>
            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-2">Bonus bets</h3>
              <p className="text-[11px] text-slate-400">Call the champion (+40), runner-up (+20) and Golden Boot (+25) over in the Bonus bets tab for a late-tournament swing.</p>
            </div>
          </div>
        )}

        {/* ================= SETTINGS / SETUP ================= */}
        {tab === "settings" && (
          <div className="space-y-4">
            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-1 flex items-center gap-1.5"><Users size={15} /> Who are you?</h3>
              <p className="text-[11px] text-slate-400 mb-3">This device is set to <span className="font-bold" style={{ color: C[me].soft }}>{me}</span>. Switch if needed.</p>
              <div className="grid grid-cols-2 gap-2">
                {PLAYERS.map((p) => (
                  <button key={p} onClick={() => chooseMe(p)}
                    className={`py-2.5 rounded-xl font-bold text-sm border ${me === p ? "border-amber-400 text-white" : "border-slate-600 text-slate-300"}`}
                    style={{ background: me === p ? C[p].solid : "transparent" }}>{p}</button>
                ))}
              </div>
            </div>

            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-2 flex items-center gap-1.5"><RefreshCw size={15} /> Sharing &amp; syncing</h3>
              <ol className="text-[12px] text-slate-300 space-y-1.5 list-decimal list-inside">
                <li>Host this page once for free (GitHub Pages / Cloudflare Pages / Netlify) and send the link to your partner.</li>
                <li>You open it and pick <span style={{ color: C.Krishiv.soft }} className="font-semibold">Krishiv</span>; she opens it and picks <span style={{ color: C.Khushi.soft }} className="font-semibold">Khushi</span> (saved per device).</li>
                <li>With your Firebase config added, predictions, results, MOTM &amp; scores sync live between both of you. Tap <span className="font-semibold text-white">sync</span> to force a refresh.</li>
              </ol>
              <p className="text-[11px] text-slate-500 mt-2">Heads up: this is a shared scoreboard, so both of you can see everything <span className="italic">after</span> a match kicks off. Picks stay hidden until then.</p>
              {lastSync && <p className="text-[10px] text-slate-600 mt-2">Last synced {lastSync.toLocaleTimeString()}{!hasStore && " · single-device only — add your Firebase config to sync"}</p>}
            </div>

            <div className="rounded-2xl border border-slate-700/60 bg-slate-800/40 p-4">
              <h3 className="font-bold text-slate-100 mb-2">Start over</h3>
              <p className="text-[11px] text-slate-400 mb-3">Clears every prediction, result and bonus bet for both of you. Can't be undone.</p>
              <button onClick={() => { if (confirm("Reset everything for both players?")) resetAll(); }}
                className="px-3 py-2 rounded-lg text-xs font-bold bg-rose-500/20 text-rose-300 border border-rose-500/40">Reset all data</button>
            </div>
          </div>
        )}
      </main>

      <footer className="fixed bottom-0 inset-x-0 text-center text-[10px] text-slate-600 py-2 bg-slate-950/80 border-t border-slate-800">
        Khushi 🆚 Krishiv · World Cup 2026 · times shown in ET &amp; IST
      </footer>
    </div>
  );
}

const bg = {
  background:
    "radial-gradient(1200px 600px at 50% -10%, rgba(16,159,110,.18), transparent 60%), radial-gradient(900px 500px at 100% 0%, rgba(251,191,36,.10), transparent 55%), #0b1220",
};

function StyleTag() {
  return (
    <style>{`
      .no-scrollbar::-webkit-scrollbar{display:none}
      .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
      .tabular-nums{font-variant-numeric:tabular-nums}
      .spin{animation:spin 1s linear infinite}
      @keyframes spin{to{transform:rotate(360deg)}}
      .crown{animation:bob 2s ease-in-out infinite}
      @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
      .tier-bull{background:rgba(251,191,36,.2);color:#fbbf24}
      .tier-good{background:rgba(16,185,129,.18);color:#34d399}
      .tier-ok{background:rgba(148,163,184,.18);color:#cbd5e1}
      .tier-miss{background:rgba(244,63,94,.16);color:#fb7185}
      .confetti-pc{position:absolute;top:-30px;font-size:20px;animation-name:fall;animation-timing-function:ease-in;animation-fill-mode:forwards}
      @keyframes fall{to{transform:translateY(105vh) rotate(360deg);opacity:.2}}
      @media (prefers-reduced-motion: reduce){.crown,.spin,.confetti-pc{animation:none}}
      select{appearance:none}
    `}</style>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(<App />);

</script>
</body>
</html>
